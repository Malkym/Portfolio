# Déploiement Render — https://render.com
#
# Render est adapté à ce projet parce qu'il propose un DISQUE PERSISTANT.
# C'est la condition indispensable : toutes les données du portfolio vivent
# dans des fichiers (base SQLite + images envoyées). Sur un hébergeur
# serverless au système de fichiers éphémère (Vercel, Netlify Functions),
# ces données seraient effacées à chaque déploiement.
#
# ATTENTION AUX CHEMINS : ce service se construit à partir du Dockerfile,
# où l'application vit dans /app. Le disque doit donc être monté sur
# /app/data, et DATABASE_PATH pointer dedans. Un chemin hors du volume
# donnerait un site fonctionnel… dont les données disparaîtraient au
# déploiement suivant.

services:
  - type: web
    name: portfolio
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter # le plan gratuit ne permet pas les disques persistants
    region: frankfurt
    branch: main

    healthCheckPath: /api/health

    disk:
      name: portfolio-data
      mountPath: /app/data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production

      # Doit rester à l'intérieur de `mountPath` ci-dessus.
      - key: DATABASE_PATH
        value: /app/data/portfolio.db

      # Générés automatiquement par Render, jamais visibles dans le dépôt.
      - key: JWT_SECRET
        generateValue: true
      - key: VISITOR_SALT
        generateValue: true

      # À saisir à la main dans le tableau de bord Render (Environment).
      # `sync: false` empêche toute valeur d'atterrir dans ce fichier versionné.
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_PATH
        sync: false
      - key: VITE_ADMIN_PATH
        sync: false
      - key: ADMIN_SECRET_QUESTION
        sync: false
      - key: ADMIN_SECRET_ANSWER
        sync: false
